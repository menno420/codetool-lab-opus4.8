name: mdverify
description: Verify that the code blocks in your Markdown docs still run — catch doc rot in CI.
branding:
  icon: check-circle
  color: green
inputs:
  paths:
    description: Files or directories to check (space-separated). Defaults to the whole repo.
    required: false
    default: "."
  args:
    description: Extra flags passed to mdverify (for example "--format json --fail-fast").
    required: false
    default: ""
  python-version:
    description: Python version to run mdverify with.
    required: false
    default: "3.x"
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - name: Install mdverify
      shell: bash
      run: python -m pip install "${{ github.action_path }}"
    - name: Run mdverify
      shell: bash
      run: mdverify ${{ inputs.args }} ${{ inputs.paths }}
